kind = "web"
previewPath = "/"
title = "SBS Agent AI Assistant"
version = "1.0.0"
id = "artifacts/sbs-agent"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19466

[services.development]
run = "pnpm --filter @workspace/sbs-agent run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sbs-agent", "run", "build" ]
publicDir = "artifacts/sbs-agent/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19466"
BASE_PATH = "/"
